    <style>
        :root {
            --bg: #09090f;
            --surface: #0f0f1a;
            --surface2: #141422;
            --border: #1c1c30;
            --accent: #00e87a;
            --accent2: #00b860;
            --warm: #f0a500;
            --text: #f0f0f8;
            --muted: #8888aa;
            --dim: #3a3a5c;
            --red: #ff4060;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        a { color: inherit; text-decoration: none; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }
        

        /* Cursor */
        .cursor { position: fixed; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%,-50%); transition: width .2s, height .2s; }
        .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(0,232,122,0.4); border-radius: 50%; pointer-events: none; z-index: 99998; transform: translate(-50%,-50%); transition: width .3s, height .3s, border-color .3s; }

        /* Header */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 18px 48px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid transparent;
            transition: border-color .3s, background .3s, backdrop-filter .3s;
        }
        header.scrolled {
            border-color: var(--border);
            background: rgba(9,9,15,0.9);
            backdrop-filter: blur(20px);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-link {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--muted); text-decoration: none; transition: color .2s;
        }
        .back-link:hover { color: var(--accent); }
        .logo {
            font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--accent); }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .status-pill {
            display: flex; align-items: center; gap: 8px;
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            letter-spacing: 1px; color: var(--muted);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 12px;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
            animation: pulse 2s ease infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .lang-btn {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--muted); background: none;
            border: 1px solid var(--border); border-radius: 4px;
            padding: 5px 10px; cursor: none; transition: all .2s;
        }
        .lang-btn:hover { color: var(--accent); border-color: rgba(0,232,122,0.3); }


        /* Hero grid & glow */
        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,232,122,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,232,122,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at 30% 40%, black 20%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Page layout */
        .page { padding: 70px 48px 48px; max-width: 1400px; margin: 0 auto; }

        /* Hero bar */
        .page-hero {
            padding: 24px 0 28px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .page-eyebrow {
            display: flex; align-items: center; gap: 10px;
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 10px;
        }
        .eyebrow-line { width: 28px; height: 1px; background: var(--accent); }
        .page-title {
            font-size: clamp(28px, 4vw, 48px);
            font-weight: 800; letter-spacing: -1.5px; line-height: 1;
        }
        .page-title .italic {
            font-family: 'Fraunces', serif; font-style: italic;
            font-weight: 300; color: var(--accent);
        }
        .count-badge {
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            color: var(--muted); padding-bottom: 4px;
        }

        /* Main grid */
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Sidebar */
        .sidebar {
            position: sticky; top: 90px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .sidebar-top {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .powered-label {
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 12px;
        }
        .tech-specs { display: flex; flex-direction: column; gap: 6px; }
        .tech-spec {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: var(--text); display: flex; align-items: center; gap: 8px;
        }
        .spec-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

        /* Model selector */
        .model-select-wrap {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .model-label {
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 8px; display: block;
        }
        .model-select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 8px 12px;
            outline: none;
            cursor: pointer;
            transition: border-color .2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .model-select:focus { border-color: var(--accent); }
        .model-timing {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            color: var(--muted); margin-top: 6px;
        }

        /* Naja chat */
        .naja-section { padding: 20px; }
        .naja-header {
            display: flex; align-items: center; gap: 12px;
            padding-bottom: 16px; margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .naja-avatar {
            width: 40px; height: 40px;
            background: rgba(0,232,122,0.1);
            border: 1px solid rgba(0,232,122,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .naja-name { font-size: 14px; font-weight: 700; }
        .naja-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }

        .chat-messages {
            max-height: 420px; overflow-y: auto;
            margin-bottom: 16px;
            display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .message { display: flex; }
        .message.user { justify-content: flex-end; }
        .message-bubble {
            max-width: 85%; padding: 10px 14px;
            border-radius: 12px; font-size: 13px; line-height: 1.5;
        }
        .message.user .message-bubble {
            background: var(--accent); color: #000;
            font-weight: 500; border-bottom-right-radius: 3px;
        }
        .message.assistant .message-bubble {
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border); border-bottom-left-radius: 3px;
        }
        .typing-indicator {
            display: inline-flex; gap: 4px; padding: 10px 14px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 12px; border-bottom-left-radius: 3px;
        }
        .typing-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--muted); animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2){animation-delay:.2s}
        .typing-dot:nth-child(3){animation-delay:.4s}
        @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

        .chat-input-row { display: flex; gap: 8px; align-items: center; }
        .chat-input {
            flex: 1; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-family: 'Syne', sans-serif;
            font-size: 13px; padding: 10px 14px; outline: none;
            transition: border-color .2s;
        }
        .chat-input:focus { border-color: var(--accent); }
        .chat-input::placeholder { color: var(--muted); }
        .send-btn {
            width: 40px; height: 40px; flex-shrink: 0;
            background: var(--accent); border: none; border-radius: 10px;
            cursor: none; display: flex; align-items: center; justify-content: center;
            transition: all .2s; box-shadow: 0 0 16px rgba(0,232,122,0.2);
        }
        .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
        .send-btn svg { width: 16px; height: 16px; }

        .error-msg {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: var(--red); background: rgba(255,64,96,0.08);
            border: 1px solid rgba(255,64,96,0.2);
            border-radius: 8px; padding: 10px 14px; margin-top: 8px;
        }

        /* Products panel */
        .products-panel { min-width: 0; }

        /* Category filters */
        .filters {
            display: flex; flex-wrap: wrap; gap: 6px;
            margin-bottom: 24px;
        }
        .filter-btn {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            letter-spacing: 0.5px; padding: 6px 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; color: var(--muted);
            cursor: none; transition: all .2s;
        }
        .filter-btn:hover { color: var(--text); border-color: var(--muted); }
        .filter-btn.active {
            background: rgba(0,232,122,0.1);
            border-color: rgba(0,232,122,0.3);
            color: var(--accent);
        }

        /* Products grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
        }
        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all .25s;
            position: relative;
            cursor: none;
        }
        .product-card:hover {
            border-color: rgba(0,232,122,0.25);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .product-badge {
            position: absolute; top: 14px; right: 14px;
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 3px 8px; border-radius: 3px;
            background: rgba(0,232,122,0.1);
            border: 1px solid rgba(0,232,122,0.2);
            color: var(--accent);
        }
        .product-emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }
        .product-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
        .product-specs { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
        .product-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
        .stars { color: var(--warm); font-size: 11px; }
        .review-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
        .product-price {
            font-family: 'JetBrains Mono', monospace; font-size: 20px;
            font-weight: 500; color: var(--accent); margin-bottom: 14px;
        }
        .ask-btn {
            width: 100%; padding: 10px;
            background: transparent; border: 1px solid var(--border);
            border-radius: 8px; color: var(--muted);
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: none; transition: all .2s;
        }
        .ask-btn:hover {
            border-color: var(--accent); color: var(--accent);
            background: rgba(0,232,122,0.05);
        }

        /* Responsive */
        @media (max-width: 968px) {
            header { padding: 18px 24px; }
            .page { padding: 80px 24px 24px; }
            .main-grid { grid-template-columns: 1fr; }
            .sidebar { position: relative; top: 0; }
            body { cursor: auto; }
            .cursor, .cursor-ring { display: none; }
        }

        @media (max-width: 768px) {
            .page-hero { padding: 16px 0 24px !important; }
            .page { padding: 76px 24px 24px !important; }
        }
    
        footer {
            border-top: 1px solid var(--border);
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-left {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }
        .footer-left span { color: var(--accent); }
        .footer-right a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .footer-right a:hover { color: var(--accent); }
        @media (max-width: 600px) {
            footer { padding: 24px; flex-direction: column; gap: 12px; align-items: flex-start; }
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-eyebrow { opacity: 0; animation: slideUp 0.8s ease 0.1s forwards; }
        .page-title   { opacity: 0; animation: slideUp 0.8s ease 0.25s forwards; }
        .page-sub     { opacity: 0; animation: slideUp 0.8s ease 0.4s forwards; }
        header        { opacity: 0; animation: slideUp 0.6s ease 0s forwards; }
    </style>
</head>

            <div class="products-grid" id="grid"></div>

    function render() {
        const t = CT[clang];
        const filtered = currentCat === 'all' ? products : products.filter(p => p.cat === currentCat);
        const countEl = document.getElementById('count'); if(countEl) countEl.textContent = filtered.length + ' ' + t.countSuffix;
        document.getElementById('grid').innerHTML = filtered.map(p => `
            <div class="product-card">
                ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
                <span class="product-emoji">${p.emoji}</span>
                <div class="product-name">${p.name}</div>
                <div class="product-specs">${p.specs}</div>
                <div class="product-rating">
                    <span class="stars">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5-Math.floor(p.rating))}</span>
                    <span class="review-count">(${p.reviews})</span>
                </div>
                <div class="product-price">€${p.price},-</div>
                <button class="ask-btn" onclick="askProduct('${p.name}')">${t.ask} →</button>
            </div>
        `).join('');
    }

    function filter(cat, e) {
        currentCat = cat;
        render();
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (e && e.target) e.target.classList.add('active');
    }

    function askProduct(name) {
        document.getElementById('input').value = clang === 'nl' ? `Vertel me over de ${name}` : `Tell me about the ${name}`;
        sendMsg();
    }

    function addMsg(txt, user = false) {
        const div = document.createElement('div');
        div.className = `message ${user ? 'user' : 'assistant'}`;
        div.innerHTML = `<div class="message-bubble">${txt}</div>`;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 999999;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message assistant'; div.id = 'typing';
        div.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 999999;
    }

    function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

    function showError(msg) {
        const div = document.createElement('div');
        div.className = 'error-msg'; div.textContent = msg;
        document.getElementById('messages').appendChild(div);
    }

    async function sendMsg() {
        const inp = document.getElementById('input');
        const msg = inp.value.trim(); if (!msg) return;
        addMsg(msg, true); inp.value = '';
        history.push({role:'user', content:msg}); showTyping();
        const model = document.getElementById('modelSelect').value;
        try {
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg, history, model})});
            removeTyping();
            if (!res.ok) throw new Error(`API error: ${res.status}`);
            const data = await res.json();
            if (data.reply) { addMsg(data.reply); history.push({role:'assistant', content:data.reply}); }
            else throw new Error(data.error || 'No reply');
        } catch(e) { removeTyping(); showError('❌ ' + e.message); }
    }

    async function checkAPI() {
        try { const r = await fetch('https://naja.nexusakai.com/health'); if(r.ok) addMsg(CT[clang].greeting); }
        catch(e) { showError(CT[clang].offline); }
    }

    function toggleLanguage() {
        clang = clang === 'nl' ? 'en' : 'nl';
        applyLang();
        render();
        // Update greeting if it's the only message shown
        const msgs = document.getElementById('messages');
        if (msgs.children.length === 1) {
            msgs.innerHTML = '';
            addMsg(CT[clang].greeting);
        }
    }

    function applyLang() {
        const t = CT[clang];
        document.getElementById('back-link').textContent = t.back;
        document.getElementById('pi-label').textContent = t.pi;
        document.getElementById('powered-by').textContent = t['powered-by'];
        document.getElementById('model-label').textContent = t.modal;
        document.getElementById('opt1').textContent = t.opt1;
        document.getElementById('opt2').textContent = t.opt2;
        document.getElementById('model-timing').textContent = t.timing;
        document.getElementById('naja-name').textContent = t.naja;
        document.getElementById('page-title').innerHTML = "AK's <span class='italic'>" + (clang === 'nl' ? 'Elektronica' : 'Electronics') + '</span>';
        document.getElementById('naja-sub').textContent = t.naja_s;
        document.getElementById('input').placeholder = t.ph;
        document.getElementById('langToggle').textContent = clang === 'nl' ? 'EN' : 'NL';
        document.documentElement.lang = clang;
        // Update filter buttons
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) el.textContent = t[key];
        });
    }

    // Cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
    (function animRing(){ rx += (mx-rx)*.12; ry += (my-ry)*.12; ring.style.left = rx+'px'; ring.style.top = ry+'px'; requestAnimationFrame(animRing); })();
    document.querySelectorAll('a, button, select').forEach(el => {
        el.addEventListener('mouseenter', () => { ring.style.width='52px'; ring.style.height='52px'; ring.style.borderColor='rgba(0,232,122,0.6)'; });
        el.addEventListener('mouseleave', () => { ring.style.width='36px'; ring.style.height='36px'; ring.style.borderColor='rgba(0,232,122,0.4)'; });
    });

    // Header scroll
    window.addEventListener('scroll', () => {
        document.getElementById('header').classList.toggle('scrolled', window.scrollY > 30);
    });

    render();
    checkAPI();
</script>
